<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Logs</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { 
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-attachment: fixed; color: #fff; padding: 40px 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 30px; overflow-x: auto; }
        h1 { margin-bottom: 20px; }
        .back-link { color: #93c5fd; text-decoration: none; margin-bottom: 20px; display: inline-block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(255,255,255,0.1); color: #93c5fd; }
        tr:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="container glass-panel">
        <a href="/dashboard" class="back-link"> Back to Dashboard</a>
        <h1>System Transaction Logs</h1>
        
        <table>
            <tr>
                <th>Issue Date</th>
                <th>Due Date</th>
                <th>Student Name</th>
                <th>Book Title</th>
            </tr>
            {% for log in logs %}
            <tr>
                <td>{{ log[0] }}</td>
                <td>{{ log[1] }}</td>
                <td>{{ log[2] }} {{ log[3] }}</td>
                <td>{{ log[4] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
