<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { 
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-attachment: fixed; color: #fff; padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 30px; text-align: center; }
        .back-link { color: #93c5fd; text-decoration: none; margin-bottom: 20px; display: inline-block; text-align: left; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 30px; border-radius: 15px; }
        .stat-number { font-size: 40px; font-weight: bold; color: #60a5fa; margin-bottom: 10px; }
        .stat-label { color: #cbd5e1; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container glass-panel">
        <a href="/dashboard" class="back-link">Back to Dashboard</a>
        <h1>Library Overview</h1>
        <p style="color: #cbd5e1;">Live database statistics for system administrators.</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">{{ books }}</div>
                <div class="stat-label">Unique Books</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">{{ students }}</div>
                <div class="stat-label">Registered Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">{{ borrows }}</div>
                <div class="stat-label">Total Borrows</div>
            </div>
        </div>
    </div>
</body>
</html>
